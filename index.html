<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="wuyifei.xyz 文档展示页，当前暂无公开文档。" />
    <title>wuyifei.xyz | 暂无公开文档</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="front-page is-empty">
    <header class="site-nav" aria-label="主导航">
      <a class="nav-brand" href="#top" aria-label="wuyifei.xyz">
        <span class="nav-mark">W</span>
        <span>wuyifei.xyz</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="#document">Status</a>
        <a href="#read">Admin</a>
      </nav>
      <a class="nav-action" href="./admin.html">Admin</a>
    </header>

    <main id="top">
      <section class="law-hero empty-hero" aria-labelledby="page-title">
        <div class="hero-shade"></div>
        <div class="hero-inner">
          <p id="hero-kicker" class="hero-kicker">DOCUMENT CENTER</p>
          <h1 id="page-title">暂无公开文档</h1>
          <p id="hero-copy" class="hero-copy">
            当前站点没有正在公开展示的文档。管理员上传新文档后，这里会自动恢复阅读入口和预览区域。
          </p>
          <div id="hero-actions" class="hero-actions">
            <a class="button button-light" href="./admin.html">进入后台</a>
          </div>
        </div>
        <div id="hero-meta" class="hero-meta" aria-label="文档信息">
          <span>No document</span>
          <span>wuyifei.xyz</span>
        </div>
      </section>

      <section id="document" class="intro-section empty-intro reveal">
        <div class="section-number">01</div>
        <div>
          <p id="status-kicker" class="section-kicker">Status</p>
          <h2 id="status-title">等待下一份公开文档。</h2>
        </div>
        <article id="doc-card" class="document-card empty-card"></article>
      </section>

      <section id="read" class="closing-section reveal">
        <p class="section-kicker">Admin</p>
        <h2>需要发布新文档时，从后台上传即可。</h2>
        <a class="button button-light" href="./admin.html">进入后台</a>

    </main>

    <script src="./script.js"></script>
