<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wuyifei.xyz | 上传后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar compact">
      <div class="brand brand-light">
        <div class="mark mark-light">A</div>
        <div>
          <div class="name">文档后台</div>
          <div class="sub">Upload only</div>
        </div>
      </div>
      <a class="text-link" href="./index.html">Back</a>
    </header>

    <main class="shell admin-shell">
      <section class="admin-grid single-admin">
        <section class="side-panel">
          <div class="section-kicker">GitHub</div>
          <div class="field">
            <label for="token">GitHub Token</label>
            <input id="token" type="password" placeholder="输入具有 repo 权限的 token" />
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="owner">Owner</label>
              <input id="owner" type="text" value="yoomi362-png" />
            </div>
            <div class="field">
              <label for="repo">Repo</label>
              <input id="repo" type="text" value="wuyifei-docs-site" />
            </div>
          </div>
          <div class="field">
            <label for="branch">Branch</label>
            <input id="branch" type="text" value="main" />
          </div>
          <button id="connect-btn" class="button primary full">Connect repo</button>
          <p id="status" class="status-note">Token 只保存在当前浏览器会话，不写入页面文件。</p>
        </section>
      </section>

      <section class="admin-grid upload-section">
        <section class="side-panel">
          <div class="section-kicker">Document</div>
          <div class="field">
            <label for="doc-title">Title</label>
            <input id="doc-title" type="text" placeholder="New document title" />
          </div>
          <div class="field">
            <label for="doc-description">Summary</label>
            <textarea id="doc-description" rows="4" placeholder="Short description"></textarea>
          </div>
          <div class="field">
            <label for="doc-file">Upload PDF / Word</label>
            <input id="doc-file" type="file" accept=".pdf,.doc,.docx,application/pdf,.doc,.docx" />
          </div>
          <div class="field">
            <label for="doc-url">Or external link</label>
            <input id="doc-url" type="url" placeholder="https://..." />
          </div>
          <button id="publish-btn" class="button primary full">Publish</button>
        </section>

        <section class="side-panel">
          <div class="section-kicker">Current</div>
          <div id="doc-admin-list" class="admin-list"></div>
        </section>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
