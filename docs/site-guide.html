  <head>
    <meta charset="UTF-8" />

    <title>站点使用说明</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="shell" style="padding: 24px 0 40px;">
      <a href="../index.html">返回首页</a>
      <section class="hero-copy" style="margin-top: 16px;">
        <p class="eyebrow">指南 · 入门</p>
        <h1 style="font-size: clamp(32px, 5vw, 48px);">站点使用说明</h1>
        <p class="lead">这个网站用于公开展示你整理好的文档。访客可以按分类浏览，也可以直接搜索标题、摘要和标签。</p>
        <ol class="steps">
          <li>首页提供分类总览和最近更新，方便快速定位内容。</li>
          <li>文档库区域会按分类分组展示当前所有公开资料。</li>
          <li>每篇文档都可以链接到站内页面、PDF 文件，或者外部文档地址。</li>
        </ol>
      </section>
    </main>
