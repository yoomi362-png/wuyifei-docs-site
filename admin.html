<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wuyifei.xyz | 上传后台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark">A</div>
        <div>
          <div class="name">文档上传后台</div>
          <div class="sub">只保留当前这一份文档</div>
        </div>
      </div>
      <nav class="nav">
        <a href="./index.html">返回前台</a>
      </nav>
    </header>

    <main class="shell admin-shell">
      <section class="admin-grid single-admin">
        <section class="side-panel">
          <div class="section-kicker">GitHub 连接</div>
          <div class="field">
            <label for="token">GitHub Token</label>
            <input id="token" type="password" placeholder="输入具有 repo 权限的 token" />
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="owner">Owner</label>
              <input id="owner" type="text" value="yoomi362-png" />
            </div>
            <div class="field">
              <label for="repo">Repo</label>
              <input id="repo" type="text" value="wuyifei-docs-site" />
            </div>
          </div>
          <div class="field">
            <label for="branch">Branch</label>
            <input id="branch" type="text" value="main" />
          </div>
          <button id="connect-btn" class="button primary full">连接仓库并读取数据</button>
          <p id="status" class="status-note">Token 只保存在当前浏览器会话，不写入页面文件。</p>
        </section>
      </section>

      <section class="admin-grid upload-section">
        <section class="side-panel">
          <div class="section-kicker">替换文档</div>
          <div class="field">
            <label for="doc-title">标题</label>
            <input id="doc-title" type="text" value="网络跳跃教程" />
          </div>
          <div class="field">
            <label for="doc-description">摘要</label>
            <textarea id="doc-description" rows="4" placeholder="简短说明这份文档是什么"></textarea>
          </div>
          <div class="field">
            <label for="doc-file">上传 PDF / Word</label>
            <input id="doc-file" type="file" accept=".pdf,.doc,.docx,application/pdf,.doc,.docx" />
          </div>
          <div class="field">
            <label for="doc-url">或使用外部链接</label>
            <input id="doc-url" type="url" placeholder="https://..." />
          </div>
          <button id="publish-btn" class="button primary full">发布并覆盖当前文档</button>
        </section>

        <section class="side-panel">
          <div class="section-kicker">当前文档</div>
          <div id="doc-admin-list" class="admin-list"></div>
        </section>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
